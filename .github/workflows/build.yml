name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/hua.exe dist/
          Copy-Item config/hua.ini dist/
          # 许可证必须随二进制分发：hua.exe 内联编译了 inih（BSD-3-Clause），
          # 其第 2 条要求二进制分发在随附材料中重现版权声明与免责条款。
          Copy-Item LICENSE dist/
          Copy-Item third_party/inih-LICENSE.txt dist/
          Compress-Archive -Path dist/* -DestinationPath hua.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hua
          path: hua.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: hua.zip
