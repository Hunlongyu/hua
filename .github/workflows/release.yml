name: Release

# 推送形如 v1.0.9 的标签时：三架构（x64 / x86 / ARM64）编译 + 测试 + 校验，
# 打包单文件 exe 与 zip，从 CHANGELOG.md 抽出本版说明，一次性发布到 GitHub Release。
# 含连字符的标签（v1.0.9-beta.1）标记为预发布，只有 beta 通道用户能收到。
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            label: win-x64
          - arch: x86
            cmake_arch: Win32
            label: win-x86
          - arch: arm64
            cmake_arch: ARM64
            label: win-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches version.h
        shell: bash
        # 版本号单一来源是 src/version.h，updater 编译进的也是它。tag 与之不一致会发出
        # 「文件名写新版、exe 里却是旧版」的错包，导致自动更新反复触发。此处强制对齐。
        run: |
          getver() { grep -E "^#define $1 " src/version.h | grep -oE '[0-9]+' | head -1; }
          hver="$(getver HUA_VER_MAJOR).$(getver HUA_VER_MINOR).$(getver HUA_VER_PATCH)"
          tag="${GITHUB_REF_NAME}"          # v1.0.9 或 v1.0.9-beta.1
          base="${tag#v}"; base="${base%%-*}"   # 去 v、去预发布后缀 → 1.0.9
          if [ "$base" != "$hver" ]; then
            echo "::error::标签 $tag 的版本 $base 与 src/version.h（$hver）不一致；请先同步 version.h 再打标签"
            exit 1
          fi
          echo "版本对齐 OK：tag=$tag，version.h=$hver"

      - name: Configure (MSVC ${{ matrix.arch }})
        run: cmake -S . -B build -A ${{ matrix.cmake_arch }}

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Test (ctest)
        # 测试不过就不发版；ARM64 产物无法在 x64 runner 执行，只做编译校验
        if: matrix.arch != 'arm64'
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Verify runtime deps + PE arch
        shell: pwsh
        run: |
          $exe = "build/Release/hua.exe"
          $dumpbin = (Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio" -Recurse -Filter dumpbin.exe -EA SilentlyContinue |
                      Where-Object { $_.FullName -match 'Hostx64\\x64' } | Select-Object -First 1).FullName
          $bad = & $dumpbin /dependents $exe | Select-String -Pattern 'VCRUNTIME|api-ms-win-crt'
          if ($bad) { $bad; throw "产物仍依赖 VC++ 运行库，违反零依赖约定" }
          $b = [IO.File]::ReadAllBytes($exe)
          $m = [BitConverter]::ToUInt16($b, [BitConverter]::ToInt32($b, 0x3C) + 4)
          $want = switch ("${{ matrix.arch }}") { "x64" { 0x8664 } "x86" { 0x14C } "arm64" { 0xAA64 } }
          if ($m -ne $want) { throw "架构不符：期望 0x$($want.ToString('X4'))，实际 0x$($m.ToString('X4'))" }
          Write-Host "零依赖 + 架构 0x$($m.ToString('X4')) OK"

      - name: Package (${{ matrix.arch }})
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"     # v1.0.9（已校验 == version.h）
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/hua.exe dist/
          Copy-Item config/hua.ini dist/
          # 许可证必须随二进制分发：hua.exe 内联编译了 inih（BSD-3-Clause）与
          # winautoupdate（MIT，含 cJSON/semver）。二进制分发需重现各自版权与免责条款。
          Copy-Item LICENSE dist/
          Copy-Item third_party/inih-LICENSE.txt dist/
          Copy-Item third_party/updater/LICENSE dist/updater-LICENSE.txt
          # 自更新裸 exe 资产：无版本号、仅带架构（hua-<arch>.exe）。更新库就地替换运行中的
          # exe、不改磁盘文件名（用户常安装为 hua.exe），故资产名带版本号只会让直接运行资产者
          # 看到文件名停在旧版本。hua 内置 pattern 现为精确名 "hua-<arch>.exe"。
          Copy-Item build/Release/hua.exe "hua-${{ matrix.arch }}.exe"
          # 过渡期同时保留旧命名 hua-v<ver>-<arch>.exe：<=1.0.10 的客户端内置的仍是旧 glob
          # "hua-*-<arch>.exe"，它只精确命中这个带版本号的资产（新 hua-<arch>.exe 少一段"-版本"
          # 不匹配），从而仍能更新过来。待旧客户端全部迁移后，后续版本可删掉这一行。
          Copy-Item build/Release/hua.exe "hua-$ref-${{ matrix.arch }}.exe"
          # 完整包（含默认配置与许可证），供全新安装。解压即得 hua.exe（无版本/架构后缀），
          # 直接作为稳定文件名使用，自更新后名字不变，claunch 等快速启动工具绑定不失效。
          Compress-Archive -Path dist/* -DestinationPath "hua-$ref-${{ matrix.label }}.zip" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hua-${{ matrix.arch }}
          path: |
            hua-${{ matrix.arch }}.exe
            hua-${{ github.ref_name }}-${{ matrix.arch }}.exe
            hua-${{ github.ref_name }}-${{ matrix.label }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 Release / 上传附件
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 需要 CHANGELOG.md

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts   # 各架构落到 artifacts/hua-<arch>/

      - name: Generate checksums.txt
        shell: bash
        # 自动更新的「限流兜底」路径走 github.com 网页端点，拿不到 REST API 的 digest 字段，
        # 改从本文件取 SHA-256 校验下载的资产（updater 按 basename 查表，见 au_web.c）。
        # 没有它，兜底路径只能跳过校验并告警——自替换的 exe 不该在无校验下落盘。
        run: |
          : > checksums.txt
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -print0 \
            | sort -z \
            | while IFS= read -r -d '' f; do
                printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(basename "$f")" >> checksums.txt
              done
          cat checksums.txt

      - name: Build release notes
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          base="${tag#v}"; base="${base%%-*}"
          # 从 CHANGELOG.md 抽出本版章节作为 Release 正文。这段正文同时是 updater 更新弹窗的
          # 内容，而弹窗是纯文本 MessageBox，故这里只放「变更内容」本身：
          #  - 不再手写下载表格——GitHub 的 Assets 区已自动列出全部资产，表格在纯文本弹窗里只会
          #    糊成一堆 markdown 符号；
          #  - 把 markdown 装饰（行首 #、**、`）抹平，让弹窗与 Release 页面都干净可读。
          # 用字面量 index() 匹配节头，不用动态正则：gawk 会把动态正则里的 \[ 当成字符类
          # 元字符而非字面 [，导致节头匹配不上、正文静默丢失（已实测）。
          section=$(awk -v hdr="## [$base]" '
            index($0, hdr) == 1 {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md)
          if [ -n "$section" ]; then
            # 抹平 markdown 装饰后，再用 `/./,$!d` 删掉开头的空行（节头后紧跟的空行）。
            printf '%s\n' "$section" | sed -E 's/^#{1,6}[[:space:]]*//; s/\*\*//g; s/`//g' \
              | sed '/./,$!d' > NOTES.md
          else
            echo "详见 CHANGELOG.md：https://github.com/${REPO}/blob/main/CHANGELOG.md" > NOTES.md
          fi
          cat NOTES.md

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # 含连字符的标签标记为预发布。若 Release 已存在则改为更新说明并覆盖附件。
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "hua $GITHUB_REF_NAME" --notes-file NOTES.md $prerelease \
            artifacts/*/* checksums.txt \
          || { gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file NOTES.md; \
               gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" artifacts/*/* checksums.txt --clobber; }
